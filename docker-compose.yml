services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - VALHALLA_URL=${VALHALLA_URL:-http://valhalla:8002}
      - TILE_SERVER_URL=${TILE_SERVER_URL:-http://martin:3000}
      - NEXT_PUBLIC_MAP_STYLE_URL=${MAP_STYLE_URL:-/map-style.json}
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL:-http://backend.desdecerovenezuela.org:8000}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:?required}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:?required}
    networks:
      - mapa_net

  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:latest
    container_name: valhalla
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ${DATA_DIR:-/root}:/custom_files
    environment:
      - tile_urls=file:///custom_files/venezuela.osm.pbf
      - use_tiles_ignore_pbf=False
      - build_tar=True
      - serve_tiles=True
      - server_threads=4
    networks:
      - mapa_net

  martin:
    image: maplibre/martin:latest
    restart: unless-stopped
    ports:
      - "8081:3000"
    command: ["/data/v3.mbtiles"]
    volumes:
      - ${DATA_DIR:-/root}:/data
    networks:
      - mapa_net

networks:
  mapa_net:
    driver: bridge
